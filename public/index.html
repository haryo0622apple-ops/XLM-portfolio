<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLM Investor Monitor</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); text-align: center; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .info { margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
        .label { font-size: 12px; color: #777; margin-bottom: 5px; }
        .value { font-family: monospace; word-break: break-all; font-size: 14px; }
        .balance-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .balance-amount { font-size: 24px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <h1>XLM Monitor</h1>
    
    <div class="input-group">
        <div class="label">Stellar Wallet Address</div>
        <input type="text" id="addressInput" placeholder="G...">
        <button onclick="saveAddress()">保存して残高を確認</button>
    </div>

    <div id="displayArea" class="info" style="display: none;">
        <div class="label">保存中のアドレス:</div>
        <div id="displayAddr" class="value"></div>
        
        <div class="balance-box">
            <div class="label">現在の残高</div>
            <div id="balanceDisplay" class="balance-amount">読み込み中...</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/13.0.0/stellar-sdk.min.js"></script>

<script>
    // Stellar ネットワークの設定
    const server = new StellarSdk.Server('https://horizon.stellar.org');

    // 1. ページ読み込み時の処理
    window.onload = async () => {
        const savedAddress = localStorage.getItem('stellar_address');
        if (savedAddress) {
            document.getElementById('addressInput').value = savedAddress;
            showMonitor(savedAddress);
            await fetchBalance(savedAddress);
        }
    };

    // 2. 保存ボタンが押された時の処理
    function saveAddress() {
        const address = document.getElementById('addressInput').value.trim();
        
        if (!address.startsWith('G') || address.length !== 56) {
            alert('正しいStellarアドレス（Gから始まる56文字）を入力してください');
            return;
        }

        localStorage.setItem('stellar_address', address);
        alert('アドレスを保存しました！');
        
        // 画面を更新して残高表示を開始
        showMonitor(address);
        fetchBalance(address);
    }

    // 3. 残高をAPIから取得する処理
    async function fetchBalance(addr) {
        const balanceEl = document.getElementById('balanceDisplay');
        balanceEl.innerText = '更新中...';

        try {
            const account = await server.loadAccount(addr);
            const native = account.balances.find(b => b.asset_type === 'native');
            
            if (native) {
                // 小数点以下を整えて表示
                const amount = parseFloat(native.balance).toLocaleString(undefined, { minimumFractionDigits: 2 });
                balanceEl.innerText = `${amount} XLM`;
            }
        } catch (e) {
            console.error(e);
            balanceEl.innerText = '取得エラー';
            alert('残高の取得に失敗しました。アドレスが有効（1 XLM以上の入金済み）か確認してください。');
        }
    }

    // 監視エリアを表示する補助関数
    function showMonitor(addr) {
        document.getElementById('displayArea').style.display = 'block';
        document.getElementById('displayAddr').innerText = addr;
    }
</script>

</body>
</html>
