<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>XLM Wallet Checker</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
padding:10px;
width:320px;
}

button{
padding:10px;
margin-left:5px;
}

#balance{
font-size:28px;
margin-top:20px;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px 20px;
}

th{
background:#f5f5f5;
}

.saved{
margin-top:40px;
}

</style>

</head>

<body>

<h1>XLM Wallet Checker</h1>

<input id="address" placeholder="Stellar Address">
<button onclick="check()">Check</button>

<br><br>

<input id="name" placeholder="Wallet Name">
<button onclick="saveWallet()">Save</button>

<div id="balance"></div>

<h2>Transaction History</h2>

<table id="txTable">

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>

<tbody></tbody>

</table>


<div class="saved">

<h2>Saved Wallets</h2>

<ul id="walletList"></ul>

</div>

<script>

let currentAddress=""

/* 検索 */

async function check(){

const address =
document.getElementById("address").value

currentAddress = address

/* balance */

const balanceRes =
await fetch(`/balance/${address}`)

const balanceData =
await balanceRes.json()

if(balanceData.error){

document.getElementById("balance")
.innerText="Address not found"

return

}

document.getElementById("balance")
.innerText =
balanceData.balance + " XLM"

/* transactions */

const txRes =
await fetch(`/transactions/${address}`)

const tx =
await txRes.json()

const tbody =
document.querySelector("#txTable tbody")

tbody.innerHTML=""

tx.forEach(t => {

const row =
document.createElement("tr")

const date =
t.time.substring(0,10)

const type =
t.type

const amount =
t.amount + " " + t.asset

row.innerHTML = `
<td>${date}</td>
<td>${type}</td>
<td>${amount}</td>
`

tbody.appendChild(row)

})

}

/* 保存 */

function saveWallet(){

const name =
document.getElementById("name").value

if(!currentAddress){
alert("Search address first")
return
}

let wallets =
JSON.parse(localStorage.getItem("wallets") || "[]")

wallets.push({
name:name,
address:currentAddress
})

localStorage.setItem(
"wallets",
JSON.stringify(wallets)
)

loadWallets()

}

/* 保存ウォレット表示 */

function loadWallets(){

const wallets =
JSON.parse(localStorage.getItem("wallets") || "[]")

const list =
document.getElementById("walletList")

list.innerHTML=""

wallets.forEach(w => {

const li =
document.createElement("li")

li.innerHTML =
`${w.name} - ${w.address}
<button onclick="loadAddress('${w.address}')">OPEN</button>`

list.appendChild(li)

})

}

/* 保存アドレス検索 */

function loadAddress(address){

document.getElementById("address").value = address

check()

}

/* 初期表示 */

loadWallets()

</script>

</body>

</html>
