<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar All-Asset Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/13.0.0/stellar-sdk.min.js"></script>
    <style>
        :root { --bg: #030712; --card: #111827; --primary: #38bdf8; --text: #f9fafb; --border: #374151; --up: #10b981; --down: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .config { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        button { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .portfolio { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 450px; }
        .asset-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .asset-name { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .asset-amount { font-size: 0.9rem; color: #94a3b8; margin-top: 2px; }
        .asset-value { text-align: right; }
        .jpy-price { font-size: 1.1rem; font-weight: 800; }
        .change-icon { margin-left: 5px; font-weight: bold; }
        .up { color: var(--up); } .down { color: var(--down); }
        #status { color: #94a3b8; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="config">
    <h2 style="color: var(--primary); margin-top:0;">Stellar All Assets</h2>
    <input type="text" id="address" placeholder="G...">
    <button onclick="updateData()">Scan Wallet</button>
    <div id="status"></div>
</div>

<div class="portfolio" id="assetList"></div>

<script>
    const server = new StellarSdk.Server('https://stellar-mainnet.publicnode.com');

    // XLMの日本円価格を取得
    async function getXlmPrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=jpy');
            const data = await res.json();
            return data.stellar.jpy;
        } catch (e) { return 0; }
    }

    // 各トークンの対XLM価格をDEXから取得
    async function getDexPrice(bal) {
        if (bal.asset_type === 'native') return 1;
        try {
            const asset = new StellarSdk.Asset(bal.asset_code, bal.asset_issuer);
            const native = StellarSdk.Asset.native();
            const orderbook = await server.orderbook(native, asset).call();
            return orderbook.bids.length > 0 ? parseFloat(orderbook.bids[0].price) : 0;
        } catch (e) { return 0; }
    }

    async function updateData() {
        const addr = document.getElementById('address').value.trim();
        const list = document.getElementById('assetList');
        const status = document.getElementById('status');

        if (!addr.startsWith('G')) return;

        status.innerText = "Scanning network...";
        list.innerHTML = "";

        try {
            const xlmPrice = await getXlmPrice();
            const acc = await server.loadAccount(addr);
            const prevBal = JSON.parse(localStorage.getItem(`pb_${addr}`) || '{}');
            const currentBal = {};

            // 保有しているすべての資産ループ
            for (const bal of acc.balances) {
                const code = bal.asset_type === 'native' ? 'XLM' : bal.asset_code;
                const amount = parseFloat(bal.balance);
                if (amount === 0) continue; // 残高0はスキップ

                currentBal[code] = amount;

                // 価格計算
                const dexPrice = await getDexPrice(bal);
                const jpyVal = (xlmPrice * dexPrice * amount);

                // 増減判定
                let diffHtml = "";
                if (prevBal[code] !== undefined) {
                    const diff = amount - prevBal[code];
                    if (diff > 0.0001) diffHtml = `<span class="change-icon up">↑</span>`;
                    else if (diff < -0.0001) diffHtml = `<span class="change-icon down">↓</span>`;
                }

                list.insertAdjacentHTML('beforeend', `
                    <div class="asset-card">
                        <div>
                            <div class="asset-name">${code}</div>
                            <div class="asset-amount">${amount.toLocaleString()} ${code}${diffHtml}</div>
                        </div>
                        <div class="asset-value">
                            <div class="jpy-price">¥${Math.floor(jpyVal).toLocaleString()}</div>
                        </div>
                    </div>
                `);
            }

            localStorage.setItem(`pb_${addr}`, JSON.stringify(currentBal));
            localStorage.setItem('last_addr', addr);
            status.innerText = "Updated: " + new Date().toLocaleTimeString();

        } catch (e) {
            status.innerText = "Error: アドレスを確認してください。";
        }
    }

    window.onload = () => {
        const saved = localStorage.getItem('last_addr');
        if (saved) { document.getElementById('address').value = saved; updateData(); }
    };
</script>
</body>
</html>
