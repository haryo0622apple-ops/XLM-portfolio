<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>XLM Wallet Tool</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
padding:10px;
width:320px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

#balance{
font-size:28px;
margin-top:20px;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px 20px;
}

th{
background:#f5f5f5;
}

.section{
margin-top:40px;
}

</style>

</head>

<body>

<h1>XLM Wallet Tool</h1>

<div id="price"></div>

<br>

<input id="address" placeholder="Stellar Address">
<button onclick="check()">Check</button>

<br><br>

<input id="name" placeholder="Wallet Name">
<button onclick="saveWallet()">Save</button>

<div id="balance"></div>
<div id="yen"></div>

<div class="section">

<h2>Token Balances</h2>

<table id="tokenTable">

<thead>
<tr>
<th>Asset</th>
<th>Balance</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="section">

<h2>Transaction History</h2>

<table id="txTable">

<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="section">

<h2>Saved Wallets</h2>

<table id="savedTable">

<thead>
<tr>
<th>Name</th>
<th>Open</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let currentAddress=""
let xlmPrice=0

/* XLM価格 */

async function loadPrice(){

const r=await fetch("/price")
const data=await r.json()

xlmPrice=data.price

document.getElementById("price")
.innerText="XLM Price ¥"+xlmPrice

}

loadPrice()

/* 検索 */

async function check(){

const address=document.getElementById("address").value

currentAddress=address

const r=await fetch(`/balance/${address}`)
const data=await r.json()

if(data.error){

document.getElementById("balance").innerText="Address not found"
return

}

document.getElementById("balance")
.innerText=data.balance+" XLM"

const yen=(data.balance*xlmPrice).toFixed(0)

document.getElementById("yen")
.innerText="≈ ¥"+yen


/* token */

const tokenRes=await fetch(`/tokens/${address}`)
const tokens=await tokenRes.json()

const tokenBody=document.querySelector("#tokenTable tbody")

tokenBody.innerHTML=""

tokens.forEach(t=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${t.asset}</td>
<td>${t.balance}</td>
`

tokenBody.appendChild(row)

})


/* transactions */

const txRes=await fetch(`/transactions/${address}`)
const tx=await txRes.json()

const txBody=document.querySelector("#txTable tbody")

txBody.innerHTML=""

tx.forEach(t=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${t.time.substring(0,10)}</td>
<td>${t.type}</td>
<td>${t.amount} ${t.asset}</td>
`

txBody.appendChild(row)

})

}


/* 保存 */

function saveWallet(){

const name=document.getElementById("name").value

if(!currentAddress){
alert("先にアドレス検索してください")
return
}

let wallets=JSON.parse(localStorage.getItem("wallets")||"[]")

wallets.push({
name:name,
address:currentAddress
})

localStorage.setItem("wallets",JSON.stringify(wallets))

loadSaved()

}


/* 保存ウォレット表示 */

function loadSaved(){

let wallets=JSON.parse(localStorage.getItem("wallets")||"[]")

const tbody=document.querySelector("#savedTable tbody")

tbody.innerHTML=""

wallets.forEach((w,index)=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${w.name}</td>
<td><button onclick="openWallet('${w.address}')">OPEN</button></td>
<td><button onclick="deleteWallet(${index})">DELETE</button></td>
`

tbody.appendChild(row)

})

}


/* OPEN */

function openWallet(address){

document.getElementById("address").value=address

check()

}


/* 削除 */

function deleteWallet(index){

let wallets=JSON.parse(localStorage.getItem("wallets")||"[]")

wallets.splice(index,1)

localStorage.setItem("wallets",JSON.stringify(wallets))

loadSaved()

}

loadSaved()

</script>

</body>

</html>
