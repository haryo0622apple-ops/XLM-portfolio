<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>XLM Wallet Checker</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
padding:10px;
width:420px;
}

button{
padding:10px;
}

#balance{
font-size:28px;
margin-top:20px;
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px 20px;
}

th{
background:#f5f5f5;
}

</style>

</head>

<body>

<h1>XLM Wallet Checker</h1>

<input id="address" placeholder="Stellar Address">

<button onclick="check()">Check</button>

<div id="balance"></div>

<h2>Transaction History</h2>

<table id="txTable">

<thead>

<tr>

<th>Date</th>
<th>Type</th>
<th>Amount</th>

</tr>

</thead>

<tbody></tbody>

</table>

<script>

async function check(){

const address =
document.getElementById("address").value

/* balance */

const balanceRes =
await fetch(`/balance/${address}`)

const balanceData =
await balanceRes.json()

if(balanceData.error){

document.getElementById("balance")
.innerText="Address not found"

return

}

document.getElementById("balance")
.innerText =
balanceData.balance + " XLM"


/* transactions */

const txRes =
await fetch(`/transactions/${address}`)

const tx =
await txRes.json()

const tbody =
document.querySelector("#txTable tbody")

tbody.innerHTML=""

tx.forEach(t => {

const row =
document.createElement("tr")

const date =
t.time.substring(0,10)

const type =
t.type

const amount =
t.amount + " " + t.asset

row.innerHTML = `
<td>${date}</td>
<td>${type}</td>
<td>${amount}</td>
`

tbody.appendChild(row)

})

}

</script>

</body>

</html>
