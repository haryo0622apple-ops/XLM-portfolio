<!DOCTYPE html>
<html>

<head>

<title>XLM Wallet Explorer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:40px;
background:#f5f5f5;
}

h2{
text-align:center;
}

input{
width:70%;
padding:12px;
font-size:16px;
}

button{
padding:12px;
font-size:16px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<h2>XLM Wallet Explorer</h2>

<div class="card">

<input id="address" placeholder="Stellar Address">

<button onclick="check()">Search</button>

</div>

<div class="card">

<h3 id="result"></h3>

</div>

<div class="card">

<h3>Asset History</h3>

<canvas id="balanceChart"></canvas>

</div>


<script>

let chart;


async function check(){

const address =
document.getElementById("address").value


const res =
await fetch(`/balance/${address}`)

const data =
await res.json()

if(data.balance){

document.getElementById("result").innerText =
data.balance + " XLM (約 ¥"+
Math.floor(data.jpyValue).toLocaleString()+")"

loadChart(address)

}else{

document.getElementById("result").innerText =
"Address not found"

}

}



async function loadChart(address){

const txRes =
await fetch(`/transactions/${address}`)

const tx =
await txRes.json()

const balanceRes =
await fetch(`/balance/${address}`)

const balanceData =
await balanceRes.json()

let balance = Number(balanceData.balance)

let labels=[]
let values=[]


tx.forEach(t=>{

labels.unshift(t.time.substring(0,10))

values.unshift(balance)

if(t.type==="receive")
balance -= Number(t.amount)

if(t.type==="send")
balance += Number(t.amount)

})


const ctx =
document.getElementById("balanceChart")

if(chart){
chart.destroy()
}

chart = new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[{

label:"XLM Balance",

data:values,

borderWidth:3,

tension:0.2

}]

}

})

}

</script>

</body>

</html>
