<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Pro Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/13.0.0/stellar-sdk.min.js"></script>
    <style>
        :root { --bg: #030712; --card: #111827; --primary: #38bdf8; --text: #f9fafb; --border: #374151; --up: #10b981; --down: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 420px; }
        .header { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0 0 15px; font-size: 20px; letter-spacing: 2px; color: var(--primary); }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 15px; box-sizing: border-box; font-family: monospace; }
        button { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .asset-card { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .asset-name { font-weight: 900; color: var(--primary); font-size: 1.1rem; }
        .asset-amt { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; }
        .asset-val { text-align: right; }
        .jpy { font-size: 1.2rem; font-weight: 800; }
        #status { font-size: 12px; color: #94a3b8; margin-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STELLAR MONITOR</h1>
        <input type="text" id="address" placeholder="G..." spellcheck="false">
        <button onclick="fetchPortfolio()">SCAN ASSETS</button>
        <div id="status">アドレスを入力して開始</div>
    </div>
    <div id="list"></div>
</div>

<script>
    // Proxy経由で接続
    const server = new StellarSdk.Server(window.location.origin + '/stellar');

    async function getXlmPrice() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=jpy');
            const d = await r.json();
            return d.stellar.jpy;
        } catch { return 0; }
    }

    async function fetchPortfolio() {
        const addr = document.getElementById('address').value.trim();
        const list = document.getElementById('list');
        const status = document.getElementById('status');

        if (!addr.startsWith('G')) return;

        localStorage.setItem('saved_addr', addr);
        status.innerText = "ネットワークスキャン中...";
        list.innerHTML = "";

        try {
            const xlmPrice = await getXlmPrice();
            const acc = await server.loadAccount(addr);
            const prev = JSON.parse(localStorage.getItem(`p_${addr}`) || '{}');
            const current = {};

            for (const b of acc.balances) {
                const code = b.asset_type === 'native' ? 'XLM' : b.asset_code;
                const amt = parseFloat(b.balance);
                if (amt === 0) continue;
                current[code] = amt;

                let dexPrice = 0;
                if (b.asset_type === 'native') {
                    dexPrice = 1;
                } else {
                    try {
                        const asset = new StellarSdk.Asset(b.asset_code, b.asset_issuer);
                        const ob = await server.orderbook(StellarSdk.Asset.native(), asset).call();
                        dexPrice = ob.bids.length > 0 ? parseFloat(ob.bids[0].price) : 0;
                    } catch { dexPrice = 0; }
                }

                const jpyVal = Math.floor(xlmPrice * dexPrice * amt);
                let diff = "";
                if (prev[code] !== undefined) {
                    if (amt > prev[code]) diff = '<span style="color:var(--up)">▲</span>';
                    else if (amt < prev[code]) diff = '<span style="color:var(--down)">▼</span>';
                }

                list.insertAdjacentHTML('beforeend', `
                    <div class="asset-card">
                        <div>
                            <div class="asset-name">${code}</div>
                            <div class="asset-amt">${amt.toLocaleString()} ${code}${diff}</div>
                        </div>
                        <div class="asset-val">
                            <div class="jpy">¥${jpyVal > 0 ? jpyVal.toLocaleString() : '---'}</div>
                        </div>
                    </div>
                `);
            }
            localStorage.setItem(`p_${addr}`, JSON.stringify(current));
            status.innerText = "最終更新: " + new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            status.innerText = "エラー: 通信に失敗しました。";
        }
    }

    window.onload = () => {
        const s = localStorage.getItem('saved_addr');
        if (s) { document.getElementById('address').value = s; fetchPortfolio(); }
    };
</script>
</body>
</html>
