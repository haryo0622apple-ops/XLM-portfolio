<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Monitor</title>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); text-align: center; }
        .label { font-size: 12px; color: #777; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .info-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .balance-amount { font-size: 24px; font-weight: bold; color: var(--primary); }
        .error-msg { color: #dc3545; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>XLM Monitor</h1>
    <div class="label">Stellar Address</div>
    <input type="text" id="addressInput" placeholder="G...">
    <button onclick="saveAndFetch()">保存して確認</button>

    <div id="resultArea" class="info-box" style="display:none;">
        <div class="label">現在の残高</div>
        <div id="balanceDisplay" class="balance-amount">読み込み中...</div>
        <div id="errorDisplay" class="error-msg"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/13.0.0/stellar-sdk.min.js"></script>

<script>
    const server = new StellarSdk.Server('https://horizon.stellar.org');

    // 起動時に保存済みアドレスがあれば読み込む
    window.onload = () => {
        const saved = localStorage.getItem('stellar_address');
        if (saved) {
            document.getElementById('addressInput').value = saved;
            fetchBalance(saved);
        }
    };

    function saveAndFetch() {
        const addr = document.getElementById('addressInput').value.trim();
        if (!addr.startsWith('G')) return alert('Gから始まるアドレスを入力してください');
        
        localStorage.setItem('stellar_address', addr);
        fetchBalance(addr);
    }

    async function fetchBalance(addr) {
        const balanceEl = document.getElementById('balanceDisplay');
        const errorEl = document.getElementById('errorDisplay');
        const area = document.getElementById('resultArea');

        area.style.display = 'block';
        balanceEl.innerText = '更新中...';
        errorEl.innerText = '';

        try {
            const account = await server.loadAccount(addr);
            const native = account.balances.find(b => b.asset_type === 'native');
            if (native) {
                const amount = parseFloat(native.balance).toLocaleString();
                balanceEl.innerText = `${amount} XLM`;
            }
        } catch (e) {
            console.error(e);
            balanceEl.innerText = '---';
            if (e.response && e.response.status === 404) {
                errorEl.innerText = 'アカウント未有効化（1 XLM以上の入金が必要です）';
            } else {
                errorEl.innerText = 'ネットワークエラーまたはアドレス間違い';
            }
        }
    }
</script>
</body>
</html>
