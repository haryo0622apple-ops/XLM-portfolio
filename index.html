<h2>XLM Balance Checker</h2>

<input id="address" placeholder="Stellar Address">
<button onclick="check()">Check</button>

<h3 id="result"></h3>

<script>

async function check(){

const address =
document.getElementById("address").value

const res =
await fetch(`/balance/${address}`)

const data =
await res.json()

if(data.balance){

document.getElementById("result").innerText =
data.balance + " XLM  (約 ¥" +
Math.floor(data.jpyValue).toLocaleString() + ")"

}else{

document.getElementById("result").innerText =
"Address not found"

}

}

</script>
