<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Pro Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/13.0.0/stellar-sdk.min.js"></script>
    <style>
        :root { --bg: #020617; --card: #0f172a; --primary: #38bdf8; --text: #f1f5f9; --border: #1e293b; --up: #22c55e; --down: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .config { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; color: var(--primary); margin-bottom: 15px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; font-family: monospace; }
        button { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .total-box { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-bottom: 20px; }
        .total-label { font-size: 0.8rem; color: var(--primary); margin-bottom: 5px; }
        .total-amount { font-size: 2rem; font-weight: 800; }
        .asset-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .asset-name { font-weight: bold; color: var(--primary); }
        .asset-amt { font-size: 0.9rem; color: #94a3b8; }
        .asset-jpy { font-size: 1.1rem; font-weight: bold; text-align: right; }
        #status { font-size: 11px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="config">
        <h1>STELLAR MONITOR</h1>
        <input type="text" id="address" placeholder="G..." spellcheck="false">
        <button onclick="update()">UPDATE PORTFOLIO</button>
        <div id="status">Ready</div>
    </div>

    <div class="total-box" id="totalArea" style="display:none;">
        <div class="total-label">ESTIMATED TOTAL VALUE</div>
        <div class="total-amount" id="grandTotal">¥ 0</div>
    </div>

    <div id="list"></div>
</div>

<script>
    async function getXlmPrice() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=stellar&vs_currencies=jpy');
            const d = await r.json();
            return d.stellar.jpy;
        } catch { return 0; }
    }

    async function update() {
        const addr = document.getElementById('address').value.trim();
        const list = document.getElementById('list');
        const status = document.getElementById('status');
        if (!addr.startsWith('G')) return;

        localStorage.setItem('saved_addr', addr);
        status.innerText = "Scanning Network...";
        list.innerHTML = "";

        // 通信先を自分のサーバーのProxy(/stellar)に向ける
        const server = new StellarSdk.Server(window.location.origin + '/stellar');

        try {
            const xlmPrice = await getXlmPrice();
            const acc = await server.loadAccount(addr);
            let totalJpyAll = 0;

            for (const b of acc.balances) {
                const code = b.asset_type === 'native' ? 'XLM' : b.asset_code;
                const amt = parseFloat(b.balance);
                if (amt === 0) continue;

                let dexPrice = (b.asset_type === 'native') ? 1 : 0;
                if (b.asset_type !== 'native') {
                    try {
                        const asset = new StellarSdk.Asset(b.asset_code, b.asset_issuer);
                        const ob = await server.orderbook(StellarSdk.Asset.native(), asset).call();
                        dexPrice = ob.bids.length > 0 ? parseFloat(ob.bids[0].price) : 0;
                    } catch { dexPrice = 0; }
                }

                const jpyVal = Math.floor(xlmPrice * dexPrice * amt);
                totalJpyAll += jpyVal;

                list.insertAdjacentHTML('beforeend', `
                    <div class="asset-card">
                        <div>
                            <div class="asset-name">${code}</div>
                            <div class="asset-amt">${amt.toLocaleString()} ${code}</div>
                        </div>
                        <div class="asset-jpy">¥${jpyVal.toLocaleString()}</div>
                    </div>
                `);
            }

            document.getElementById('totalArea').style.display = 'block';
            document.getElementById('grandTotal').innerText = "¥ " + totalJpyAll.toLocaleString();
            status.innerText = "Updated: " + new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            status.innerText = "Connection failed. Please use Railway URL and Brave Secret mode.";
        }
    }

    window.onload = () => {
        const s = localStorage.getItem('saved_addr');
        if (s) { document.getElementById('address').value = s; update(); }
    };
</script>
</body>
</html>
